"<div class=\"hl\"><div class=\"hl-header\"><div class=\"hl-title\">Switching off homebrew telemetry</div></div><pre><code class=\"language-zsh\"><span data-line-number=\"1\"><span class=\"pl-c\"># turns off homebrew telemetry</span></span>\n<span data-line-number=\"2\"><span class=\"pl-k\">export</span> HOMEBREW_NO_ANALYTICS=1</span>\n<span data-line-number=\"3\"><span class=\"pl-c\"># turns off homebrew auto-update</span></span>\n<span data-line-number=\"4\"><span class=\"pl-k\">export</span> HOMEBREW_NO_AUTO_UPDATE=1</span>\n</code></pre><div class=\"hl-footer\"><div class=\"hl-language\">zsh</div></div></div>"
